@if (runnerPrintStatus == "Ok") {
  <div class="ready"><span>Έτοιμο Για Εκτύπωση</span></div>
} @else if (runnerPrintStatus == "AlreadyPrinted") {
  <div class="printed"><span>Ο Δρομέας Έχει Εκτυπωθεί</span></div>
} @else if (runnerPrintStatus == "NotFound") {
  <div class="not-found"><span>Δε βρέθηκε Δρομέας</span></div>
}
